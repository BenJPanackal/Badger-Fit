      new google.maps.LatLng(42.9, -89.6),
      new google.maps.LatLng(43.2, -89.1)
    );

    const autocomplete = new google.maps.places.Autocomplete(input, {
      bounds:                madisonBounds,
      strictBounds:          false,
      componentRestrictions: { country: 'us' },
      types:                 ['address'],
      fields:                ['formatted_address', 'geometry']
    });

    autocomplete.addListener('place_changed', () => {
      const place = autocomplete.getPlace();

      if (!place.geometry) {
        addressVerified = false;
        return;
      }

      addressVerified = true;
      errorMsg.style.display = 'none';
      input.value = place.formatted_address;

      placeUserPin(
        place.geometry.location.lat(),
        place.geometry.location.lng(),
        place.formatted_address
      );
    });

    // Reset verification if user edits after picking
    input.addEventListener('input', () => {
      addressVerified = false;
    });
  }

  // Called by "Pin Me" button
  function pinMyLocation() {
    const input    = document.getElementById('addressInput');
    const errorMsg = document.getElementById('addressError');

    if (input.value.trim() === '') {
      // Empty — just use GPS
      locateMe();
      return;
    }

    if (!addressVerified) {
      errorMsg.style.display = 'block';
      setTimeout(() => errorMsg.style.display = 'none', 3000);
      return;
    }

    errorMsg.style.display = 'none';
    // coords already set by place_changed — nothing more to do
  }

  window.initAutocomplete = initAutocomplete;
</script>

<!-- Google Maps JS with Places + Autocomplete callback -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB7kVzLuB_DdC0Fezbwtyom_sLSjQJgL8k&libraries=places&callback=initAutocomplete"
  async defer>
</script>
