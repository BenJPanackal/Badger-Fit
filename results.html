<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Results · BadgerFit</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Page header ── */
    .results-hero {
      background: var(--dark);
      color: #fff;
      text-align: center;
      padding: 3rem 2rem 2rem;
    }

    .results-hero .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.5rem;
    }

    .results-hero h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .results-hero h1 span { color: var(--red); }

    .results-hero .sub {
      color: #aaa;
      font-size: 0.95rem;
    }

    /* ── Search again bar ── */
    .search-again {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.25rem 2rem;
      background: var(--white);
      border-bottom: 1px solid #ddd;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .search-mode-label {
      font-size: 0.85rem;
      color: #888;
      white-space: nowrap;
    }

    .autocomplete-wrap {
      position: relative;
    }

    .autocomplete-wrap input {
      padding: 0.7rem 1rem;
      width: 300px;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-family: inherit;
    }

    .search-again button {
      padding: 0.7rem 1.3rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.2s;
    }

    .search-again button:hover { background: #a00e19; }

    /* ── Autocomplete dropdown ── */
    .ac-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 999;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }

    .ac-dropdown.open { display: block; }

    .ac-item {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      color: #1a1a1a;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.1s;
    }

    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover, .ac-item.highlighted { background: #fff0f0; color: #c1121f; }

    .ac-item mark {
      background: none;
      color: #c1121f;
      font-weight: 700;
    }

    /* ── Results grid ── */
    .results-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .results-count {
      font-size: 1rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .results-count strong { color: var(--dark); }

    .gym-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      align-items: start;
    }

    /* ── Gym card (light theme) ── */
    .gym-card {
      background: var(--white);
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .gym-card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      transform: translateY(-2px);
    }

    .gym-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.2;
    }

    .gym-address { font-size: 0.82rem; color: #777; }

    .gym-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.75rem;
      font-size: 0.82rem;
      color: #666;
    }

    .card-actions {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .visit-btn {
      display: inline-block;
      background: var(--red);
      color: #fff;
      padding: 0.48rem 1rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.12s;
    }

    .visit-btn:hover { background: #a00e19; transform: translateY(-1px); }
    .no-website { font-size: 0.78rem; color: #aaa; }

    .show-all-btn {
      background: transparent;
      border: 1px solid #ddd;
      color: #888;
      font-size: 0.8rem;
      padding: 0.42rem 0.85rem;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }

    .show-all-btn:hover { border-color: var(--red); color: var(--red); }
    .show-all-btn .chevron { display: inline-block; transition: transform 0.25s; }
    .show-all-btn.open .chevron { transform: rotate(180deg); }

    .gym-full-info {
      display: none;
      border-top: 1px solid #eee;
      padding-top: 1rem;
      margin-top: 0.25rem;
      animation: fadeUp 0.2s ease;
    }

    .gym-full-info.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .info-section { margin-bottom: 0.85rem; }
    .info-section:last-child { margin-bottom: 0; }

    .info-section-label {
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #999;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .info-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }

    .info-tag {
      border-radius: 6px;
      padding: 0.22rem 0.55rem;
      font-size: 0.74rem;
      border: 1px solid #ddd;
      color: #555;
      background: #f8f8f8;
    }

    .info-tag.amenity   { border-color: #b8dfc7; color: #2d7a52; background: #f0faf4; }
    .info-tag.equipment { border-color: #b5d0ee; color: #2a5f96; background: #f0f6fc; }
    .info-tag.class-tag { border-color: #d4b8ee; color: #6b3fa0; background: #f8f0fd; }

    .info-row {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 0.25rem;
      display: flex;
      gap: 0.5rem;
    }

    .info-row strong { color: var(--dark); min-width: 70px; }

    .hours-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.18rem 0.65rem;
      font-size: 0.76rem;
      color: #666;
    }

    .hours-grid .day { color: var(--dark); font-weight: 600; }

    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: #888;
    }

    .state-box .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .state-box a { color: var(--red); text-decoration: none; font-weight: 600; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #eee;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="logo">🦡 BadgerFit</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="Gyms.html">Gyms in Madison</a></li>
    <li><a href="map.html">🗺️ Map</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<!-- RESULTS HEADER -->
<div class="results-hero">
  <p class="eyebrow">Search Results</p>
  <h1 id="resultsTitle">Searching...</h1>
  <p class="sub" id="resultsSub"></p>
</div>

<!-- SEARCH AGAIN -->
<div class="search-again">
  <span class="search-mode-label" id="modeLabel"></span>
  <div class="autocomplete-wrap">
    <input type="text" id="refineInput" placeholder="Refine your search..." autocomplete="off" />
    <div class="ac-dropdown" id="ac-refine"></div>
  </div>
  <button onclick="refineSearch()">Search</button>
</div>

<!-- RESULTS -->
<section class="results-section">
  <p class="results-count" id="resultsCount"></p>
  <div class="gym-grid" id="gymGrid">
    <div class="state-box">
      <div class="spinner"></div>
      <p>Finding gyms...</p>
    </div>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2025 BadgerFit · Madison, WI · CheeseHacks Hackathon</p>
</footer>

<script>
  const params           = new URLSearchParams(window.location.search);
  const searchQuery      = params.get('search') || '';
  const neighborhoodQuery = params.get('neighborhood') || '';
  const isNameSearch     = !!searchQuery;
  const query            = searchQuery || neighborhoodQuery;

  document.getElementById('modeLabel').textContent = isNameSearch ? '🔤 By Name:' : '📍 By Location:';
  document.getElementById('refineInput').value = query;
  document.getElementById('refineInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') refineSearch();
  });

  function refineSearch() {
    const val = document.getElementById('refineInput').value.trim();
    if (!val) return;
    const key = isNameSearch ? 'search' : 'neighborhood';
    window.location.href = `results.html?${key}=${encodeURIComponent(val)}`;
  }

  // ── Autocomplete engine ───────────────────────────────────────────────────────
  function buildAutocomplete(inputId, dropdownId, getSuggestions, onEnter) {
    const input    = document.getElementById(inputId);
    const dropdown = document.getElementById(dropdownId);
    let highlighted = -1;

    function highlight(idx) {
      const items = dropdown.querySelectorAll('.ac-item');
      items.forEach((el, i) => el.classList.toggle('highlighted', i === idx));
      highlighted = idx;
    }

    function showSuggestions(suggestions) {
      if (!suggestions.length) { dropdown.classList.remove('open'); return; }
      const q = input.value.trim();
      dropdown.innerHTML = suggestions.map(s => {
        const re    = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        const label = s.replace(re, '<mark>$1</mark>');
        return `<div class="ac-item" onclick="selectRefine('${s.replace(/'/g, "\\'")}')">${label}</div>`;
      }).join('');
      dropdown.classList.add('open');
      highlighted = -1;
    }

    input.addEventListener('input', () => {
      const val = input.value.trim();
      if (!val) { dropdown.classList.remove('open'); return; }
      showSuggestions(getSuggestions(val));
    });

    input.addEventListener('keydown', e => {
      const items = dropdown.querySelectorAll('.ac-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        highlight(Math.min(highlighted + 1, items.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        highlight(Math.max(highlighted - 1, 0));
      } else if (e.key === 'Enter') {
        if (highlighted >= 0 && items[highlighted]) {
          items[highlighted].click();
        } else {
          dropdown.classList.remove('open');
          onEnter();
        }
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
      }
    });

    document.addEventListener('click', e => {
      if (!input.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
      }
    });
  }

  function selectRefine(value) {
    document.getElementById('refineInput').value = value;
    document.getElementById('ac-refine').classList.remove('open');
    refineSearch();
  }

  // ── Tag & card helpers ────────────────────────────────────────────────────────
  function formatTags(arr, cls) {
    if (!arr || !arr.length) return '<span style="color:#bbb;font-size:0.76rem">None listed</span>';
    return arr.map(item => {
      const label = item.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return `<span class="info-tag ${cls}">${label}</span>`;
    }).join('');
  }

  function formatHours(hoursText) {
    if (!hoursText || !hoursText.length) return '<span style="color:#bbb;font-size:0.76rem">Hours not available</span>';
    return `<div class="hours-grid">${hoursText.map(line => {
      const colon = line.indexOf(':');
      const day   = line.slice(0, colon);
      const time  = line.slice(colon + 1).trim();
      return `<span class="day">${day}</span><span>${time}</span>`;
    }).join('')}</div>`;
  }

  function toggleInfo(btn, panelId) {
    const panel  = document.getElementById(panelId);
    const isOpen = panel.classList.contains('visible');
    panel.classList.toggle('visible', !isOpen);
    btn.classList.toggle('open', !isOpen);
    btn.childNodes[0].textContent = isOpen ? 'Show Info ' : 'Hide Info ';
  }

  function renderCard(gym, idx) {
    const panelId = `info-${idx}`;
    return `
      <div class="gym-card">
        <div class="gym-name">${gym.name}</div>
        <div class="gym-address">📍 ${gym.address}</div>
        <div class="gym-meta">
          ${gym.rating       ? `<span>⭐ ${gym.rating} (${gym.totalRatings})</span>` : ''}
          ${gym.monthlyPrice ? `<span>💵 $${gym.monthlyPrice}/mo</span>` : ''}
          ${gym.phone        ? `<span>📞 ${gym.phone}</span>` : ''}
        </div>
        <div class="card-actions">
          ${gym.website
            ? `<a href="${gym.website}" target="_blank" class="visit-btn">Visit Website →</a>`
            : `<span class="no-website">No website available</span>`}
          <button class="show-all-btn" onclick="toggleInfo(this, '${panelId}')">
            Show Info <span class="chevron">&#8964;</span>
          </button>
        </div>
        <div class="gym-full-info" id="${panelId}">
          <div class="info-section">
            <div class="info-section-label">📍 Contact &amp; Details</div>
            ${gym.phone ? `<div class="info-row"><strong>Phone</strong>${gym.phone}</div>` : ''}
            <div class="info-row"><strong>Price</strong>${gym.monthlyPrice ? `$${gym.monthlyPrice}/month` : 'Contact for pricing'}</div>
            ${gym.rating ? `<div class="info-row"><strong>Rating</strong>⭐ ${gym.rating} (${gym.totalRatings} reviews)</div>` : ''}
          </div>
          <div class="info-section">
            <div class="info-section-label">🏊 Amenities</div>
            <div class="info-tags">${formatTags(gym.amenities, 'amenity')}</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🏋️ Equipment</div>
            <div class="info-tags">${formatTags(gym.equipment, 'equipment')}</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🧘 Classes</div>
            <div class="info-tags">${formatTags(gym.classes, 'class-tag')}</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🕐 Hours</div>
            ${formatHours(gym.hoursText)}
          </div>
        </div>
      </div>`;
  }

  // ── Filter logic ──────────────────────────────────────────────────────────────
  function filterGyms(gyms) {
    const q = query.toLowerCase();
    if (!q) return gyms;
    if (isNameSearch) {
      return gyms.filter(g => g.name.toLowerCase().includes(q));
    } else {
      return gyms.filter(g => g.address.toLowerCase().includes(q));
    }
  }

  // ── Load, wire autocomplete, render ──────────────────────────────────────────
  async function loadResults() {
    const grid    = document.getElementById('gymGrid');
    const titleEl = document.getElementById('resultsTitle');
    const subEl   = document.getElementById('resultsSub');
    const countEl = document.getElementById('resultsCount');

    titleEl.innerHTML = isNameSearch
      ? `Results for <span>"${query}"</span>`
      : `Gyms near <span>"${query}"</span>`;

    try {
      const res  = await fetch('http://localhost:3000/api/gyms');
      if (!res.ok) throw new Error('Server error');
      const gyms = await res.json();

      // Build autocomplete suggestions from loaded data
      const names = [...new Set(gyms.map(g => g.name))].sort();
      const areaSet = new Set();
      gyms.forEach(g => {
        const parts = (g.address || '').split(',');
        if (parts.length >= 3) areaSet.add(parts[parts.length - 3].trim());
      });
      const areas = [...areaSet].sort();
      const suggestions = isNameSearch ? names : areas;

      buildAutocomplete(
        'refineInput', 'ac-refine',
        (q) => suggestions.filter(s => s.toLowerCase().includes(q.toLowerCase())).slice(0, 8),
        refineSearch
      );

      // Render results
      const matches = filterGyms(gyms);

      if (!matches.length) {
        subEl.textContent  = 'No gyms matched your search.';
        countEl.textContent = '';
        grid.innerHTML = `
          <div class="state-box">
            <div class="icon">🔍</div>
            <p>No gyms found for <strong>"${query}"</strong>.</p>
            <p><a href="index.html">← Try a different search</a></p>
          </div>`;
        return;
      }

      subEl.textContent  = `${matches.length} gym${matches.length !== 1 ? 's' : ''} found`;
      countEl.innerHTML  = `Showing <strong>${matches.length}</strong> result${matches.length !== 1 ? 's' : ''}`;
      grid.innerHTML     = matches.map((gym, i) => renderCard(gym, i)).join('');

    } catch (err) {
      titleEl.textContent = 'Could not load results';
      grid.innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p>Make sure the server is running: <code>node server.js</code></p>
          <p><a href="index.html">← Go back</a></p>
        </div>`;
      console.error(err);
    }
  }

  loadResults();
</script>

</body>
</html>
