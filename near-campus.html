<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Near Campus · BadgerFit</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="survey.css" />
  <style>
    body { display: block; padding: 0; }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #111; border-bottom: 1px solid #2a2a2a; position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Segoe UI', sans-serif; font-size: 1.4rem; font-weight: bold; color: var(--accent); text-decoration: none; letter-spacing: normal; }
    .nav-links { list-style: none; display: flex; gap: 2rem; }
    .nav-links a { color: #f0f0f0; text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent); }

    .page-hero { text-align: center; padding: 4rem 2rem 2.5rem; }
    .page-hero .eyebrow { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; color: #666; margin-bottom: 0.75rem; }
    .page-hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 10vw, 7rem); line-height: 0.9; letter-spacing: 0.02em; color: var(--accent); }
    .page-hero .sub { margin-top: 1rem; color: #666; font-size: 0.95rem; }

    .gyms-section { max-width: 1200px; margin: 0 auto; padding: 2rem 2rem 5rem; }
    .gym-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; align-items: start; }
    @media (max-width: 900px) { .gym-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 560px) { .gym-grid { grid-template-columns: 1fr; } }

    .gym-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; gap: 0.6rem; transition: border-color 0.2s, transform 0.15s; }
    .gym-card:hover { border-color: rgba(255,46,46,0.35); transform: translateY(-2px); }
    .gym-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.35rem; letter-spacing: 0.04em; color: #f0f0f0; line-height: 1.1; }
    .gym-address { font-size: 0.78rem; color: #666; }
    .gym-meta { display: flex; flex-wrap: wrap; gap: 0.4rem 0.85rem; font-size: 0.8rem; color: #666; }

    .distance-badge { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(106,176,236,0.1); border: 1px solid #2a3f5a; color: #6ab0ec; font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 6px; }

    .card-actions { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; margin-top: auto; padding-top: 0.4rem; }
    .visit-btn { display: inline-block; background: var(--accent); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.08em; padding: 0.5rem 1.1rem; border-radius: 10px; text-decoration: none; transition: transform 0.12s, box-shadow 0.12s; }
    .visit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,46,46,0.3); }
    .no-website { font-size: 0.78rem; color: #555; }

    .show-all-btn { display: inline-flex; align-items: center; gap: 0.4rem; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; padding: 0.45rem 0.9rem; border-radius: 8px; cursor: pointer; transition: border-color 0.15s, color 0.15s; }
    .show-all-btn:hover { border-color: var(--accent); color: var(--accent); }
    .show-all-btn .chevron { display: inline-block; transition: transform 0.25s ease; font-style: normal; }
    .show-all-btn.open .chevron { transform: rotate(180deg); }

    .gym-full-info { display: none; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.4rem; animation: fadeUp 0.2s ease; }
    .gym-full-info.visible { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .info-section { margin-bottom: 0.9rem; }
    .info-section:last-child { margin-bottom: 0; }
    .info-section-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
    .info-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .info-tag { border-radius: 6px; padding: 0.22rem 0.55rem; font-size: 0.74rem; border: 1px solid var(--border); color: #f0f0f0; background: #111; }
    .info-tag.amenity { border-color: #2a5a3a; color: #6ecb8a; background: rgba(110,203,138,0.07); }
    .info-tag.equipment { border-color: #2a3f5a; color: #6ab0ec; background: rgba(106,176,236,0.07); }
    .info-tag.class-tag { border-color: #4a3a5a; color: #c084fc; background: rgba(192,132,252,0.07); }
    .info-row { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.25rem; display: flex; gap: 0.5rem; }
    .info-row strong { color: #f0f0f0; min-width: 70px; }
    .hours-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.18rem 0.65rem; font-size: 0.76rem; color: var(--muted); }
    .hours-grid .day { color: #f0f0f0; font-weight: 500; }

    .empty-state { text-align: center; padding: 5rem 2rem; color: #555; grid-column: 1/-1; }
    .loading { text-align: center; padding: 5rem 2rem; color: #666; grid-column: 1/-1; }
    .spinner { width: 36px; height: 36px; border: 3px solid #2a2a2a; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; padding: 1.5rem; background: #111; border-top: 1px solid #2a2a2a; color: #444; font-size: 0.85rem; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">🦡 BadgerFit</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="Gyms.html">Gyms in Madison</a></li>
    <li><a href="about.html">About</a></li>
  </ul>
</nav>

<div class="page-hero">
  <p class="eyebrow">Madison, WI</p>
  <h1>Near Campus</h1>
  <p class="sub" id="gymCount">Loading gyms...</p>
</div>

<section class="gyms-section">
  <div class="gym-grid" id="gymGrid">
    <div class="loading">
      <div class="spinner"></div>
      <p>Loading gyms...</p>
    </div>
  </div>
</section>

<footer>
  <p>© 2025 BadgerFit · Madison, WI · CheesHacks Hackathon</p>
</footer>

<script>
  const SKIP = new Set(['Hilldale Shopping Center', 'Unifinium LTD']);

  // UW-Madison campus center (Bascom Hill area)
  const CAMPUS_LAT = 43.0731;
  const CAMPUS_LNG = -89.4012;
  const MAX_MILES = 2.0;

  function haversineDistance(lat1, lng1, lat2, lng2) {
    const R = 3958.8; // Earth radius in miles
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function isNearCampus(gym) {
    if (!gym.coordinates) return false;
    const dist = haversineDistance(CAMPUS_LAT, CAMPUS_LNG, gym.coordinates.lat, gym.coordinates.lng);
    return dist <= MAX_MILES;
  }

  function getDistance(gym) {
    if (!gym.coordinates) return Infinity;
    return haversineDistance(CAMPUS_LAT, CAMPUS_LNG, gym.coordinates.lat, gym.coordinates.lng);
  }

  function formatTags(arr, cls) {
    if (!arr || !arr.length) return '<span style="color:#555;font-size:0.76rem">None listed</span>';
    return arr.map(item => {
      const label = item.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return `<span class="info-tag ${cls}">${label}</span>`;
    }).join('');
  }

  function formatHours(hoursText) {
    if (!hoursText || !hoursText.length) return '<span style="color:#555;font-size:0.76rem">Hours not available</span>';
    return `<div class="hours-grid">${hoursText.map(line => {
      const colon = line.indexOf(':');
      const day = line.slice(0, colon);
      const time = line.slice(colon + 1).trim();
      return `<span class="day">${day}</span><span>${time}</span>`;
    }).join('')}</div>`;
  }

  function toggleInfo(btn, panelId) {
    const panel = document.getElementById(panelId);
    const isOpen = panel.classList.contains('visible');
    panel.classList.toggle('visible', !isOpen);
    btn.classList.toggle('open', !isOpen);
    btn.childNodes[0].textContent = isOpen ? 'Show All Info ' : 'Hide Info ';
  }

  function renderCard(gym, idx, distMiles) {
    const panelId = `info-${idx}`;
    return `
      <div class="gym-card">
        <div class="gym-name">${gym.name}</div>
        <div class="gym-address">📍 ${gym.address}</div>
        <div class="gym-meta">
          ${gym.rating ? `<span>⭐ ${gym.rating} (${gym.totalRatings})</span>` : ''}
          ${gym.monthlyPrice ? `<span>💵 $${gym.monthlyPrice}/mo</span>` : ''}
          ${gym.phone ? `<span>📞 ${gym.phone}</span>` : ''}
          <span class="distance-badge">📍 ${distMiles.toFixed(1)} mi from campus</span>
        </div>
        <div class="card-actions">
          ${gym.website ? `<a href="${gym.website}" target="_blank" class="visit-btn">Visit Website →</a>` : `<span class="no-website">No website available</span>`}
          <button class="show-all-btn" onclick="toggleInfo(this, '${panelId}')">
            Show All Info <i class="chevron">&#8964;</i>
          </button>
        </div>
        <div class="gym-full-info" id="${panelId}">
          <div class="info-section">
            <div class="info-section-label">📍 Contact &amp; Details</div>
            ${gym.phone ? `<div class="info-row"><strong>Phone</strong>${gym.phone}</div>` : ''}
            <div class="info-row"><strong>Price</strong>${gym.monthlyPrice ? `$${gym.monthlyPrice} / month` : 'Contact for pricing'}</div>
            ${gym.rating ? `<div class="info-row"><strong>Rating</strong>⭐ ${gym.rating} (${gym.totalRatings} reviews)</div>` : ''}
            <div class="info-row"><strong>Distance</strong>${distMiles.toFixed(2)} miles from campus</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🏊 Amenities</div>
            <div class="info-tags">${formatTags(gym.amenities, 'amenity')}</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🏋️ Equipment</div>
            <div class="info-tags">${formatTags(gym.equipment, 'equipment')}</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🧘 Classes</div>
            <div class="info-tags">${formatTags(gym.classes, 'class-tag')}</div>
          </div>
          <div class="info-section">
            <div class="info-section-label">🕐 Hours</div>
            ${formatHours(gym.hoursText)}
          </div>
        </div>
      </div>`;
  }

  async function loadGyms() {
    const grid = document.getElementById('gymGrid');
    const countEl = document.getElementById('gymCount');
    try {
      const res = await fetch('gyms.json');
      if (!res.ok) throw new Error('Failed to load');
      const gyms = await res.json();
      const withDist = gyms
        .filter(g => !SKIP.has(g.name) && isNearCampus(g))
        .map(g => ({ ...g, _dist: getDistance(g) }))
        .sort((a, b) => a._dist - b._dist);
      countEl.textContent = `${withDist.length} gyms within ${MAX_MILES} miles of UW-Madison campus, sorted by distance.`;
      if (withDist.length === 0) {
        grid.innerHTML = `<div class="empty-state"><p>No gyms found near campus.</p></div>`;
      } else {
        grid.innerHTML = withDist.map((gym, i) => renderCard(gym, i, gym._dist)).join('');
      }
    } catch (err) {
      grid.innerHTML = `<div class="loading"><p style="color:#666">Could not load gym data. Make sure <code>gyms.json</code> is in the same folder and the server is running.</p></div>`;
      countEl.textContent = '';
    }
  }

  loadGyms();
</script>
</body>
</html>
